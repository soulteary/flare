name: Build and Push Docker Image

# 配置手动触发
on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: '镜像版本号 (例如: 20260411)'
        required: true
        default: '20260411'

env:
  # 你指定的镜像名称
  IMAGE_NAME: flare-vickai

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # 赋予向 GitHub Packages (GHCR) 推送镜像的权限
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 设置 Docker Buildx (用于构建镜像的高级引擎)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录到 GitHub 容器镜像仓库 (GHCR)
      - name: Log in to the Container registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker 镜像名称必须全小写，此步骤将 GitHub 用户名自动转为小写
      - name: Lowercase Repository Owner
        run: |
          echo "REPO_OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # 使用原作者提供的 amd64 Dockerfile 进行构建并推送
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/manual/Dockerfile.amd64
          platforms: linux/amd64
          push: true
          # 同时打上你指定的 version_tag 和 latest 两个标签
          tags: |
            ghcr.io/${{ env.REPO_OWNER }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.version_tag }}
            ghcr.io/${{ env.REPO_OWNER }}/${{ env.IMAGE_NAME }}:latest